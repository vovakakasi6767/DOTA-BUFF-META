<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Dota Buff Meta</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="nav-logo">DOTA<span>BUFF</span> META</div>
        <h2>Создать аккаунт</h2>
        <p class="auth-subtitle">Зарегистрируйтесь, чтобы создавать свои сборки</p>
        
        <div id="authError" class="auth-error"></div>
        
        <form id="registerForm">
            <div class="auth-form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" placeholder="Введите имя пользователя" required>
            </div>
            <div class="auth-form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Введите email" required>
            </div>
            <div class="auth-form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль (минимум 6 символов)" minlength="6" required>
            </div>
            <div class="auth-form-group">
                <label for="confirmPassword">Подтвердите пароль</label>
                <input type="password" id="confirmPassword" placeholder="Повторите пароль" required>
            </div>
            <button type="submit" class="auth-btn">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>
        </form>
        
        <div class="auth-links">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
        <div class="auth-links">
            <a href="../index.html"><i class="fas fa-arrow-left"></i> На главную</a>
        </div>
    </div>
</div>
<script src="../js/auth.js"></script>
</body>
</html>
